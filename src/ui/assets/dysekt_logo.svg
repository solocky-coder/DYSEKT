<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <!-- Waveform bars -->
  <rect x="0"  y="10" width="3" height="15" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="5"  y="4"  width="3" height="27" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="10" y="7"  width="3" height="21" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="15" y="1"  width="3" height="33" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="20" y="7"  width="3" height="21" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="25" y="12" width="3" height="12" rx="1.5" fill="currentColor" opacity="0.85"/>
  <rect x="30" y="8"  width="3" height="18" rx="1.5" fill="currentColor" opacity="0.85"/>
  <!-- Diagonal cut line through bars -->
  <line x1="0" y1="33" x2="35" y2="1" stroke="currentColor" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="44" y="37" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-weight="700" font-size="38" letter-spacing="4" fill="currentColor">DYSEKT</text>
</svg>
