name: Build DYSEKT VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify fluidsynth-prebuilt is present
        shell: pwsh
        run: |
          if (-not (Test-Path "fluidsynth-prebuilt\bin\libfluidsynth-3.dll")) {
            Write-Error "fluidsynth-prebuilt\bin\libfluidsynth-3.dll NOT FOUND. Check that fluidsynth-prebuilt is committed to the repo and not in .gitignore."
            exit 1
          }
          Write-Host "FluidSynth DLLs found:"
          Get-ChildItem "fluidsynth-prebuilt\bin\*.dll" | Select-Object Name

      - name: Fetch JUCE
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force JUCE -ErrorAction SilentlyContinue
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git JUCE

      - name: Fetch bungee
        shell: pwsh
        run: |
          if (-not (Test-Path "bungee/src")) {
            Remove-Item -Recurse -Force bungee -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/kupix/bungee.git bungee
          }

      - name: Fetch signalsmith-stretch
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-stretch/signalsmith-stretch.h")) {
            Remove-Item -Recurse -Force signalsmith-stretch -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/signalsmith-stretch.git signalsmith-stretch
          }

      - name: Fetch signalsmith-linear
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-linear")) {
            Remove-Item -Recurse -Force signalsmith-linear -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/linear.git signalsmith-linear
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DJUCE_BUILD_EXTRAS=OFF `
            -DJUCE_BUILD_EXAMPLES=OFF

      - name: Build shared code only
        shell: pwsh
        run: cmake --build build --config Release --target Dysekt --parallel

      - name: Copy FluidSynth DLLs next to VST3 before final link step
        shell: pwsh
        run: |
          $vst3dir = "build\Dysekt_artefacts\Release\VST3\DYSEKT.vst3\Contents\x86_64-win"
          New-Item -ItemType Directory -Force -Path $vst3dir | Out-Null
          Get-ChildItem "fluidsynth-prebuilt\bin\*.dll" | ForEach-Object {
            Copy-Item -Force $_.FullName $vst3dir
            Write-Host "Copied: $($_.Name) -> $vst3dir"
          }

      - name: Build VST3 final link + moduleinfo
        shell: pwsh
        run: cmake --build build --config Release --target Dysekt_VST3 --parallel

      - name: Bundle FluidSynth DLLs into VST3
        shell: pwsh
        run: |
          $vst3dir = "build\Dysekt_artefacts\Release\VST3\DYSEKT.vst3\Contents\x86_64-win"
          Get-ChildItem "fluidsynth-prebuilt\bin\*.dll" | ForEach-Object {
            Copy-Item -Force $_.FullName $vst3dir
          }
          Write-Host "Final VST3 contents:"
          Get-ChildItem $vst3dir | Select-Object Name

      - name: Collect VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $dirs = Get-ChildItem -Recurse -Filter "*.vst3" build/ | Where-Object { $_.PSIsContainer }
          foreach ($d in $dirs) {
            Copy-Item -Recurse -Force $d.FullName artifacts/
          }
          Write-Host "Collected VST3 bundles:"
          Get-ChildItem artifacts/ -Recurse

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-VST3
          path: artifacts/
          if-no-files-found: error
