name: Build DYSEKT VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch JUCE
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force JUCE -ErrorAction SilentlyContinue
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git JUCE

      - name: Fetch bungee
        shell: pwsh
        run: |
          if (-not (Test-Path "bungee/src")) {
            Remove-Item -Recurse -Force bungee -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/kupix/bungee.git bungee
          }

      - name: Fetch signalsmith-stretch
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-stretch/signalsmith-stretch.h")) {
            Remove-Item -Recurse -Force signalsmith-stretch -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/signalsmith-stretch.git signalsmith-stretch
          }

      - name: Fetch signalsmith-linear
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-linear")) {
            Remove-Item -Recurse -Force signalsmith-linear -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/linear.git signalsmith-linear
          }

      - name: Fetch sfizz
        shell: pwsh
        run: |
          if (-not (Test-Path "sfizz/CMakeLists.txt")) {
            Remove-Item -Recurse -Force sfizz -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/sfztools/sfizz.git sfizz
          }

      - name: Install FluidSynth via vcpkg
        shell: pwsh
        run: |
          vcpkg install fluidsynth:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_APPLOCAL_DEPS=OFF `
            -DJUCE_BUILD_EXTRAS=OFF `
            -DJUCE_BUILD_EXAMPLES=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          # Copy the VST3 bundle
          $dirs = Get-ChildItem -Recurse -Filter "*.vst3" build/ | Where-Object { $_.PSIsContainer }
          foreach ($d in $dirs) {
            Copy-Item -Recurse -Force $d.FullName artifacts/
          }

          # Copy FluidSynth and its runtime DLLs into the VST3 bundle so it loads in DAWs
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
          $vst3Contents = "artifacts/DYSEKT.vst3/Contents/x86_64-win"
          if (Test-Path $vst3Contents) {
            Get-ChildItem "$vcpkgBin/*.dll" | ForEach-Object {
              Copy-Item $_.FullName $vst3Contents
            }
          }

          Write-Host "Collected artifacts:"
          Get-ChildItem artifacts/ -Recurse

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-VST3
          path: artifacts/
          if-no-files-found: error
