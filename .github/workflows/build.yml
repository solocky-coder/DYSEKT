name: Build DYSEKT VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch JUCE
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force JUCE -ErrorAction SilentlyContinue
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git JUCE

      - name: Fetch bungee
        shell: pwsh
        run: |
          if (-not (Test-Path "bungee/src")) {
            Remove-Item -Recurse -Force bungee -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/kupix/bungee.git bungee
          }

      - name: Fetch signalsmith-stretch
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-stretch/signalsmith-stretch.h")) {
            Remove-Item -Recurse -Force signalsmith-stretch -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/signalsmith-stretch.git signalsmith-stretch
          }

      - name: Fetch signalsmith-linear
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-linear")) {
            Remove-Item -Recurse -Force signalsmith-linear -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/linear.git signalsmith-linear
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DJUCE_BUILD_EXTRAS=OFF `
            -DJUCE_BUILD_EXAMPLES=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Collect VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $files = Get-ChildItem -Recurse -Filter "*.vst3" build/
          foreach ($f in $files) {
            Copy-Item -Recurse -Force $f.FullName artifacts/
          }

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-VST3
          path: artifacts/
          if-no-files-found: error
